site_name: s3-manager Documentation
site_description: Explore and manage S3-compatible object storage with IAM-aligned workflows.
site_author: s3-manager contributors
repo_name: s3-manager
repo_url: https://github.com/ksperis/s3-manager
edit_uri: edit/main/doc/docs/
site_url: https://ksperis.github.io/s3-manager/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

nav:
  - Home: index.md
  - User Guide:
      - Overview: user/index.md
      - Start here: user/start-here.md
      - User profile: user/profile.md
      - Use cases (storage admin): user/use-cases-storage-admin.md
      - Use cases (storage user): user/use-cases-storage-user.md
      - "Workspace: Admin": user/workspace-admin.md
      - "Workspace: Manager": user/workspace-manager.md
      - "Workspace: Browser": user/workspace-browser.md
      - "Workspace: Ceph Admin": user/workspace-ceph-admin.md
      - "Workspace: Storage Ops": user/workspace-storage-ops.md
      - "Feature: Buckets": user/feature-buckets.md
      - "How-to: Configure a bucket from Manager": user/howto-manager-bucket-configuration.md
      - "Feature: IAM": user/feature-iam.md
      - "Feature: Object operations in Browser": user/feature-objects-browser.md
      - "Feature: SNS topics": user/feature-topics.md
      - "How-to: Ceph Admin advanced filter": user/howto-ceph-advanced-filter.md
      - "How-to: Ceph Admin UI tags": user/howto-ceph-ui-tags.md
      - "How-to: Storage Ops UI tags": user/howto-storage-ops-ui-tags.md
      - "Feature: Bucket compare": user/feature-bucket-compare.md
      - "Feature: Bucket migration": user/feature-bucket-migration.md
      - Troubleshooting: user/troubleshooting.md
  - Ops / Sysadmin Guide:
      - Overview: ops/index.md
      - Deploy with Docker Compose: ops/deploy-docker-compose.md
      - Deploy with Helm: ops/deploy-helm.md
      - Configuration: ops/configuration.md
      - "Operations: healthchecks": ops/operations-healthchecks.md
      - "Operations: billing": ops/operations-billing.md
      - "Operations: quota monitoring and history": ops/operations-quota-monitoring.md
      - "Operations: API tokens": ops/operations-api-tokens.md
      - "Operations: admin automation API": ops/operations-admin-automation.md
      - "Operations: security": ops/operations-security.md
      - "Operations: observability": ops/operations-observability.md
      - "Operations: upgrade and compatibility": ops/operations-upgrade-compatibility.md
      - "Backends: compatibility matrix": ops/backends-compatibility.md
      - "Backends: Ceph RGW": ops/backends-ceph-rgw.md
      - "Backends: other S3 implementations": ops/backends-others.md
  - Developer Guide:
      - Overview: developer/index.md
      - Architecture overview: developer/architecture-overview.md
      - "Architecture: backend": developer/architecture-backend.md
      - "Architecture: frontend": developer/architecture-frontend.md
