services:
  backend:
    build:
      context: backend
    environment:
      CORS_ORIGINS: '["http://127.0.0.1:8080", "http://localhost:8080"]'
      DATABASE_URL: sqlite:////data/app.db
      APP_SETTINGS_PATH: /data/app_settings.json
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend-data:
