[alembic]
script_location = alembic
# Runtime note:
# `backend/alembic/env.py` overrides this with `Settings.database_url`.
# The backend default resolves SQLite to `backend/app.db`, regardless of the shell cwd.
sqlalchemy.url = sqlite:////absolute/path/to/backend/app.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
