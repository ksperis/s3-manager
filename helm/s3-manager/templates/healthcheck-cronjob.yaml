{{- if .Values.healthcheckCronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "s3-manager.fullname" . }}-healthcheck
  labels:
    {{- include "s3-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: healthcheck-cron
spec:
  schedule: {{ .Values.healthcheckCronJob.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.healthcheckCronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.healthcheckCronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.healthcheckCronJob.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "s3-manager.labels" . | nindent 12 }}
            app.kubernetes.io/component: healthcheck-cron
        spec:
          restartPolicy: OnFailure
          containers:
            - name: healthcheck-runner
              image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
              imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
              env:
                - name: HEALTHCHECK_API_BASE
                  value: {{ printf "http://%s-backend:%d" (include "s3-manager.fullname" .) (.Values.service.backend.port | int) | quote }}
                {{- $backendToken := get .Values.backend.env "INTERNAL_CRON_TOKEN" }}
                {{- if $backendToken }}
                - name: INTERNAL_CRON_TOKEN
                  value: {{ $backendToken | quote }}
                {{- else if .Values.healthcheckCronJob.internalToken }}
                - name: INTERNAL_CRON_TOKEN
                  value: {{ .Values.healthcheckCronJob.internalToken | quote }}
                {{- end }}
                {{- range .Values.healthcheckCronJob.extraEnv }}
                - name: {{ .name }}
                  value: {{ .value | quote }}
                {{- end }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  python - <<'PY'
                  import os
                  import sys
                  import requests

                  base = os.environ.get("HEALTHCHECK_API_BASE")
                  token = os.environ.get("INTERNAL_CRON_TOKEN")
                  if not base or not token:
                      print("Missing HEALTHCHECK_API_BASE or INTERNAL_CRON_TOKEN", file=sys.stderr)
                      sys.exit(1)
                  url = f"{base}/api/internal/healthchecks/run"
                  resp = requests.post(url, headers={"X-Internal-Token": token}, timeout=30)
                  print(resp.status_code, resp.text)
                  resp.raise_for_status()
                  PY
{{- end }}
