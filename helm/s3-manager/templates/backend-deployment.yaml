apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "s3-manager.fullname" . }}-backend
  labels:
    {{- include "s3-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "s3-manager.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if and .Values.billingCronJob.internalToken (not (hasKey .Values.backend.env "INTERNAL_CRON_TOKEN")) }}
            - name: INTERNAL_CRON_TOKEN
              value: {{ .Values.billingCronJob.internalToken | quote }}
            {{- end }}
            {{- if and .Values.postgresql.enabled (not (hasKey .Values.backend.env "DATABASE_URL")) }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "s3-manager.fullname" . }}-postgresql
                  key: database-url
            {{- end }}
            {{- if and (not .Values.postgresql.enabled) (not (hasKey .Values.backend.env "DATABASE_URL")) }}
            - name: DATABASE_URL
              value: "sqlite:////data/app.db"
            {{- end }}
            {{- range .Values.backend.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- if .Values.backend.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- if .Values.backend.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "s3-manager.fullname" . }}-backend
      {{- end }}
