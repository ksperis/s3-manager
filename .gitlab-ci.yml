        --scanners vuln \
        --vuln-type os,library \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
        --timeout "$TRIVY_TIMEOUT" \
        $TRIVY_NO_PROGRESS \
        --username "$TRIVY_USERNAME" \
        --password "$TRIVY_PASSWORD" \
        --format table \
        "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    - test -z "${scan_exit:-}"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gl-security-reports/frontend-image-trivy.json

promote-backend:
  extends: .promote-image
  variables:
    SOURCE_IMAGE: "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"
    TARGET_GITLAB_IMAGE: "$CI_REGISTRY_IMAGE/backend"
    TARGET_GHCR_IMAGE: "$GHCR_BACKEND_IMAGE"

promote-frontend:
  extends: .promote-image
  variables:
    SOURCE_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    TARGET_GITLAB_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
    TARGET_GHCR_IMAGE: "$GHCR_FRONTEND_IMAGE"
