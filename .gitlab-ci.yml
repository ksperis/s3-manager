ceph-functional-tests:
  stage: test
  image: python:3.12-slim
  needs: []
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - if: '$CEPH_TEST_BACKEND_BASE_URL && $CEPH_TEST_SUPERADMIN_EMAIL && $CEPH_TEST_SUPERADMIN_PASSWORD'
      when: on_success
    - when: never
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements-test.txt
    - mkdir -p gl-test-reports
  script:
    - cd backend
    - PYTHONPATH=. python tests_ceph_functional/run.py -q --junit-xml=../gl-test-reports/ceph-functional-junit.xml
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gl-test-reports/ceph-functional-junit.xml
    reports:
      junit: gl-test-reports/ceph-functional-junit.xml

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA" backend
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build --build-arg VITE_API_URL="$VITE_API_URL" -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"

secret_detection:
  stage: security
  allow_failure: false
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: on_success
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: never

backend-image-vuln-scan:
  extends: .trivy-job
  stage: security
  needs:
    - build-backend
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  script:
    - |
      trivy image \
        --scanners vuln \
        --vuln-type os,library \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
        --timeout "$TRIVY_TIMEOUT" \
        $TRIVY_NO_PROGRESS \
        --username "$TRIVY_USERNAME" \
        --password "$TRIVY_PASSWORD" \
        --format json \
        --output gl-security-reports/backend-image-trivy.json \
        "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA" || scan_exit=$?
    - |
      trivy image \
        --scanners vuln \
        --vuln-type os,library \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
        --timeout "$TRIVY_TIMEOUT" \
        $TRIVY_NO_PROGRESS \
        --username "$TRIVY_USERNAME" \
        --password "$TRIVY_PASSWORD" \
        --format table \
        "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"
    - test -z "${scan_exit:-}"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gl-security-reports/backend-image-trivy.json

frontend-image-vuln-scan:
  extends: .trivy-job
  stage: security
  needs:
    - build-frontend
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  script:
    - |
      trivy image \
        --scanners vuln \
        --vuln-type os,library \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
