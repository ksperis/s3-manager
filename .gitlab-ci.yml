    TARGET_GHCR_IMAGE: "$GHCR_FRONTEND_IMAGE"

promote-backend-release:
  extends: .promote-public-image
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v.+$/'
      when: on_success
    - when: never
  variables:
    PROMOTION_KIND: "release"
    SOURCE_IMAGE: "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"
    TARGET_GHCR_IMAGE: "$GHCR_BACKEND_IMAGE"

promote-frontend-release:
  extends: .promote-public-image
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v.+$/'
      when: on_success
    - when: never
  variables:
    PROMOTION_KIND: "release"
    SOURCE_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    TARGET_GHCR_IMAGE: "$GHCR_FRONTEND_IMAGE"
