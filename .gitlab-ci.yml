include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - build
  - security
  - promote

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  VITE_API_URL: "/api"
  TRIVY_IMAGE: "aquasec/trivy:0.69.3"
  SKOPEO_IMAGE: "quay.io/skopeo/stable:latest"
  TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.trivycache"
  TRIVY_SEVERITY: "HIGH,CRITICAL"
  TRIVY_TIMEOUT: "20m0s"
  TRIVY_NO_PROGRESS: "--no-progress"
  TRIVY_USERNAME: "$CI_REGISTRY_USER"
  TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
  DEV_BRANCH: "dev"
  GHCR_REGISTRY: "ghcr.io"
  GHCR_NAMESPACE: "ksperis"
  GHCR_BACKEND_IMAGE: "ghcr.io/ksperis/s3-manager-backend"
  GHCR_FRONTEND_IMAGE: "ghcr.io/ksperis/s3-manager-frontend"

.trivy-job:
  image:
    name: $TRIVY_IMAGE
    entrypoint: [""]
  cache:
    key: trivy-cache
    paths:
      - .trivycache/
  before_script:
    - trivy --version
    - mkdir -p gl-security-reports
  artifacts:
    when: always
    expire_in: 1 week

.promote-image:
  stage: promote
  image:
    name: $SKOPEO_IMAGE
    entrypoint: [""]
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $DEV_BRANCH'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: never
  script:
    - test -n "$SOURCE_IMAGE"
    - test -n "$TARGET_GITLAB_IMAGE"
    - test -n "$TARGET_GHCR_IMAGE"
    - test -n "$GHCR_USERNAME"
    - test -n "$GHCR_TOKEN"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        promotion_tags="$CI_COMMIT_TAG"
        normalized_release_tag="${CI_COMMIT_TAG#v}"
        if [ "$normalized_release_tag" != "$CI_COMMIT_TAG" ]; then
          promotion_tags="$promotion_tags $normalized_release_tag"
        fi
      elif [ "$CI_COMMIT_BRANCH" = "$DEV_BRANCH" ]; then
        promotion_tags="dev dev-$CI_COMMIT_SHORT_SHA"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        promotion_tags="latest"
      else
        echo "No public tags to promote for this ref"
        exit 0
      fi
    - |
      source_digest=$(skopeo inspect --creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" --format '{{.Digest}}' "docker://$SOURCE_IMAGE")
      for tag in $promotion_tags; do
        gitlab_target="docker://$TARGET_GITLAB_IMAGE:$tag"
        ghcr_target="docker://$TARGET_GHCR_IMAGE:$tag"

        skopeo copy \
          --src-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
          --dest-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
          "docker://$SOURCE_IMAGE" \
          "$gitlab_target"
        skopeo copy \
          --src-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
          --dest-creds "$GHCR_USERNAME:$GHCR_TOKEN" \
          "docker://$SOURCE_IMAGE" \
          "$ghcr_target"

        gitlab_digest=$(skopeo inspect --creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" --format '{{.Digest}}' "$gitlab_target")
        ghcr_digest=$(skopeo inspect --creds "$GHCR_USERNAME:$GHCR_TOKEN" --format '{{.Digest}}' "$ghcr_target")
        test "$gitlab_digest" = "$source_digest"
        test "$ghcr_digest" = "$source_digest"
      done

backend-tests:
  stage: test
  image: python:3.12-slim
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements-test.txt
    - rm -f backend/.env
    - mkdir -p gl-test-reports
    - for var in $(env | cut -d= -f1 | grep '^OIDC_PROVIDERS__' || true); do unset "$var"; done
    - export OIDC_PROVIDERS="{}"
  script:
    - cd backend
    - PYTHONPATH=. python -m pytest tests -q --junit-xml=../gl-test-reports/backend-junit.xml
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gl-test-reports/backend-junit.xml
    reports:
      junit: gl-test-reports/backend-junit.xml

backend-deadcode:
  stage: test
  image: python:3.12-slim
  needs: []
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements-test.txt
  script:
    - cd backend
    - python scripts/check_vulture.py

backend-vuln-scan:
  extends: .trivy-job
  stage: test
  needs: []
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  script:
    - |
      trivy fs \
        --scanners vuln \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
        --timeout "$TRIVY_TIMEOUT" \
        $TRIVY_NO_PROGRESS \
        --format json \
        --output gl-security-reports/backend-dependencies-trivy.json \
        backend || scan_exit=$?
    - |
      trivy fs \
        --scanners vuln \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
        --timeout "$TRIVY_TIMEOUT" \
        $TRIVY_NO_PROGRESS \
        --format table \
        backend
    - test -z "${scan_exit:-}"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gl-security-reports/backend-dependencies-trivy.json

