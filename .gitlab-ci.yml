include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - build
  - security
  - promote

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  VITE_API_URL: "/api"
  TRIVY_IMAGE: "aquasec/trivy:0.69.3"
  SKOPEO_IMAGE: "quay.io/skopeo/stable:latest"
  TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.trivycache"
  TRIVY_SEVERITY: "HIGH,CRITICAL"
  TRIVY_TIMEOUT: "20m0s"
  TRIVY_NO_PROGRESS: "--no-progress"
  TRIVY_USERNAME: "$CI_REGISTRY_USER"
  TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
  DEV_BRANCH: "dev"
  GHCR_REGISTRY: "ghcr.io"
  GHCR_NAMESPACE: "ksperis"
  GHCR_BACKEND_IMAGE: "ghcr.io/ksperis/s3-manager-backend"
  GHCR_FRONTEND_IMAGE: "ghcr.io/ksperis/s3-manager-frontend"

.trivy-job:
  image:
    name: $TRIVY_IMAGE
    entrypoint: [""]
  cache:
    key: trivy-cache
    paths:
      - .trivycache/
  before_script:
    - trivy --version
    - mkdir -p gl-security-reports
  artifacts:
    when: always
    expire_in: 1 week

.promote-internal-image:
  stage: promote
  image:
    name: $SKOPEO_IMAGE
    entrypoint: [""]
  script:
    - test -n "$SOURCE_IMAGE"
    - test -n "$TARGET_GITLAB_IMAGE"
    - |
      source_digest=$(skopeo inspect --creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" --format '{{.Digest}}' "docker://$SOURCE_IMAGE")
      for tag in dev "dev-$CI_COMMIT_SHORT_SHA"; do
        gitlab_target="docker://$TARGET_GITLAB_IMAGE:$tag"

        skopeo copy \
          --src-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
          --dest-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
          "docker://$SOURCE_IMAGE" \
          "$gitlab_target"

        gitlab_digest=$(skopeo inspect --creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" --format '{{.Digest}}' "$gitlab_target")
        test "$gitlab_digest" = "$source_digest"
      done

.promote-public-image:
  stage: promote
  image:
    name: $SKOPEO_IMAGE
    entrypoint: [""]
  script:
    - test -n "$SOURCE_IMAGE"
    - test -n "$TARGET_GHCR_IMAGE"
    - test -n "$GHCR_USERNAME"
    - test -n "$GHCR_TOKEN"
    - |
      if [ "$PROMOTION_KIND" = "main" ]; then
        promotion_tags="latest"
      elif [ "$PROMOTION_KIND" = "release" ]; then
        normalized_release_tag="${CI_COMMIT_TAG#v}"
        if [ -z "$CI_COMMIT_TAG" ] || [ "$normalized_release_tag" = "$CI_COMMIT_TAG" ]; then
          echo "Release promotion requires a Git tag matching vX.Y.Z"
          exit 1
        fi
        case "$normalized_release_tag" in
          *.*.*) ;;
          *)
            echo "Release promotion requires a semver tag matching vX.Y.Z"
            exit 1
            ;;
        esac
        release_major_minor="${normalized_release_tag%.*}"
        if [ -z "$release_major_minor" ] || [ "$release_major_minor" = "$normalized_release_tag" ]; then
          echo "Unable to derive X.Y alias from release tag $CI_COMMIT_TAG"
          exit 1
        fi
        promotion_tags="$normalized_release_tag $release_major_minor"
      else
        echo "Unsupported PROMOTION_KIND: $PROMOTION_KIND"
        exit 1
      fi
    - |
      source_digest=$(skopeo inspect --creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" --format '{{.Digest}}' "docker://$SOURCE_IMAGE")
      for tag in $promotion_tags; do
        ghcr_target="docker://$TARGET_GHCR_IMAGE:$tag"

        skopeo copy \
          --src-creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" \
          --dest-creds "$GHCR_USERNAME:$GHCR_TOKEN" \
          "docker://$SOURCE_IMAGE" \
          "$ghcr_target"

        ghcr_digest=$(skopeo inspect --creds "$GHCR_USERNAME:$GHCR_TOKEN" --format '{{.Digest}}' "$ghcr_target")
        test "$ghcr_digest" = "$source_digest"
      done

backend-tests:
  stage: test
  image: python:3.12-slim
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements-test.txt
    - rm -f backend/.env
    - mkdir -p gl-test-reports
    - for var in $(env | cut -d= -f1 | grep '^OIDC_PROVIDERS__' || true); do unset "$var"; done
    - export OIDC_PROVIDERS="{}"
  script:
    - cd backend
    - PYTHONPATH=. python -m pytest tests -q --junit-xml=../gl-test-reports/backend-junit.xml
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gl-test-reports/backend-junit.xml
    reports:
      junit: gl-test-reports/backend-junit.xml

backend-deadcode:
  stage: test
  image: python:3.12-slim
  needs: []
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements-test.txt
  script:
    - cd backend
    - python scripts/check_vulture.py

backend-vuln-scan:
  extends: .trivy-job
  stage: test
  needs: []
  rules:
    - if: '$SECRET_DETECTION_HISTORIC_SCAN == "true"'
      when: never
    - when: on_success
  script:
    - |
      trivy fs \
        --scanners vuln \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
        --timeout "$TRIVY_TIMEOUT" \
        $TRIVY_NO_PROGRESS \
        --format json \
        --output gl-security-reports/backend-dependencies-trivy.json \
        backend || scan_exit=$?
    - |
      trivy fs \
        --scanners vuln \
        --severity "$TRIVY_SEVERITY" \
        --ignore-unfixed \
        --ignorefile .trivyignore \
        --timeout "$TRIVY_TIMEOUT" \
        $TRIVY_NO_PROGRESS \
        --format table \
        backend
    - test -z "${scan_exit:-}"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gl-security-reports/backend-dependencies-trivy.json

