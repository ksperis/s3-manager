name: Release tag metadata

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-tag-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Confirm release source of truth
        run: |
          echo "Release tag: ${GITHUB_REF_NAME}"
          echo "Container images are published by GitLab CI after build and security validation."
          echo "GitHub Actions does not build or push official GHCR images for release tags."
